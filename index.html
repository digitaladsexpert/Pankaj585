<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050d18;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
position:relative;
}

.bg{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#00bfff20,transparent 70%);
animation:spin 18s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.card{
width:92%;
max-width:420px;
background:rgba(12,20,35,.92);
backdrop-filter:blur(15px);
border:1px solid rgba(0,191,255,.2);
border-radius:28px;
padding:20px;
text-align:center;
position:relative;
z-index:5;
box-shadow:0 0 40px rgba(0,191,255,.15);
animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
50%{
transform:translateY(-6px);
}
}

.ticker-wrap{
overflow:hidden;
margin-bottom:15px;
}

.ticker{
display:inline-flex;
gap:20px;
white-space:nowrap;
animation:ticker 12s linear infinite;
font-size:12px;
font-weight:600;
}

@keyframes ticker{
0%{
transform:translateX(100%);
}
100%{
transform:translateX(-100%);
}
}

.live-dot{
width:10px;
height:10px;
background:#ff3030;
border-radius:50%;
display:inline-block;
box-shadow:0 0 15px #ff3030;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.2;
transform:scale(1.4);
}
}

.red{
color:#ff5d5d;
animation:redGlow 2s infinite;
}

.green{
color:#00ff99;
animation:greenGlow 2s infinite;
}

@keyframes redGlow{
50%{
text-shadow:0 0 12px #ff5d5d;
}
}

@keyframes greenGlow{
50%{
text-shadow:0 0 12px #00ff99;
}
}

.profile{
width:90px;
height:90px;
margin:auto;
padding:3px;
border-radius:50%;
background:linear-gradient(135deg,#00c6ff,#0072ff);
box-shadow:0 0 30px #00bfff;
animation:pulse 2s infinite;
}

.profile img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

@keyframes pulse{
50%{
transform:scale(1.06);
}
}

.verify{
position:absolute;
margin-left:58px;
margin-top:-28px;
width:25px;
height:25px;
background:#00bfff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
}

h1{
font-size:30px;
margin-top:15px;
font-weight:800;
background:linear-gradient(90deg,#00d4ff,#008cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
font-size:12px;
opacity:.8;
margin-top:4px;
}

.members{
margin-top:12px;
font-size:18px;
font-weight:700;
}

.info{
font-size:13px;
line-height:1.8;
margin-top:12px;
}

.badges{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-top:14px;
}

.badge{
padding:7px 12px;
background:#10203a;
border-radius:30px;
font-size:11px;
border:1px solid rgba(0,191,255,.25);
}

.join{
display:block;
margin-top:18px;
padding:16px;
border-radius:16px;
text-decoration:none;
font-size:18px;
font-weight:700;
color:#fff;
background:linear-gradient(90deg,#008cff,#00c8ff);
box-shadow:0 0 25px #00bfff;
animation:btnGlow 1.8s infinite;
}

@keyframes btnGlow{
50%{
transform:scale(1.03);
box-shadow:0 0 40px #00bfff;
}
}

.features{
margin-top:15px;
}

.feature{
padding:10px;
margin:8px 0;
background:rgba(0,191,255,.06);
border:1px solid rgba(0,191,255,.15);
border-radius:12px;
font-size:13px;
}

.popup{
position:fixed;
left:15px;
bottom:15px;
background:#0c1628;
border:1px solid #00bfff;
padding:12px 15px;
border-radius:12px;
font-size:12px;
box-shadow:0 0 20px rgba(0,191,255,.3);
z-index:999;
animation:popupFloat 3s infinite;
}

@keyframes popupFloat{
50%{
transform:translateY(-6px);
}
}

.dot{
position:absolute;
width:3px;
height:3px;
background:#00bfff;
border-radius:50%;
opacity:.7;
animation:move linear infinite;
}

@keyframes move{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="ticker-wrap">
<div class="ticker">

<span><span class="live-dot"></span> LIVE</span>
<span class="red">BTC ▼0.06%</span>
<span class="red">NIFTY ▼0.48%</span>
<span class="green">👀 <span id="viewers">1249</span></span>

</div>
</div>

<div class="profile">
<img src="Pankaj Photo.jpg</div>

<div class="verify">✓</div>

<h1>Pankaj Bhardwaj</h1>

<div class="sub">
OFFICIAL COMMUNITY
</div>

<div class="members">
👥 10,584+ Members
</div>

<div class="info">
📊 Daily Insights<br>
🎓 Educational Content<br>
⚡ Real-Time Updates
</div>

<div class="badges">
<div class="badge">💎 PREMIUM</div>
<div class="badge">📈 INSIGHTS</div>
<div class="badge">⚡ DAILY</div>
<div class="badge">🌎 GLOBAL</div>
</div>

<a href="https://t.me/+TONSxtldo-lkOTk1" class="join">
🚀 JOIN FREE CHANNEL
</a>

<div class="features">
<div class="feature">🔥 Active Community</div>
<div class="feature">📊 Daily Updates</div>
<div class="feature">⚡ Instant Notifications</div>
</div>

</div>

<div class="popup" id="popup">
🚀 Rahul joined just now
</div>

<script>

for(let i=0;i<40;i++){
let d=document.createElement('div');
d.className='dot';
d.style.left=Math.random()*100+'%';
d.style.animationDuration=(8+Math.random()*8)+'s';
document.body.appendChild(d);
}

const notifications=[
"🚀 Rahul joined just now",
"🔥 Aman unlocked access",
"⭐ Priya joined from Delhi",
"💎 Vikash became member",
"🚀 Neha joined just now",
"🔥 Arjun unlocked access",
"⭐ Karan joined from Mumbai",
"💎 Suresh became member"
];

let n=0;

setInterval(()=>{
document.getElementById('popup').innerHTML=notifications[n];
n=(n+1)%notifications.length;
},3000);

setInterval(()=>{
let v=document.getElementById("viewers");
let count=parseInt(v.innerText);
count += Math.floor(Math.random()*8)-3;
if(count<1000) count=1000;
v.innerText=count;
},2500);

</script>

</body>
